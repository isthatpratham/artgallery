<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#d37969",
              "background-light": "#f8f6f6",
              "background-dark": "#1f1513",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Admin Login - ArtGallery</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 md:px-10 py-4 bg-background-light dark:bg-background-dark">
<div class="flex items-center gap-3 text-primary">
<span class="material-symbols-outlined text-3xl">palette</span>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">ArtGallery</h2>
</div>
<div>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Back to Gallery</a>
</div>
</header>
<!-- Main Content Area: Centered Login Card -->
<main class="flex flex-1 items-center justify-center p-6">
<div class="layout-content-container flex flex-col w-full max-w-[440px] bg-white dark:bg-slate-900/50 rounded-xl shadow-xl shadow-primary/5 overflow-hidden border border-primary/5">
<!-- Card Header Image/Visual -->
<div class="w-full h-48 bg-primary/10 flex items-center justify-center relative">
<div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary via-transparent to-transparent"></div>
<div class="z-10 flex flex-col items-center">
<div class="p-4 rounded-full bg-white dark:bg-background-dark shadow-sm">
<span class="material-symbols-outlined text-4xl text-primary">lock</span>
</div>
</div>
<div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-white dark:from-slate-900 to-transparent"></div>
</div>
<!-- Form Content -->
<div class="px-8 pb-10 pt-2">
<div class="text-center mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Admin Login</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Manage your collection and gallery settings</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="form-input w-full pl-12 pr-4 py-3.5 rounded-xl border-primary/20 bg-background-light dark:bg-background-dark focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="admin@artgallery.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative flex items-stretch">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">key</span>
<input class="form-input w-full pl-12 pr-12 py-3.5 rounded-xl border-primary/20 bg-background-light dark:bg-background-dark focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-2 px-1 py-1">
<input class="rounded border-primary/30 text-primary focus:ring-primary/20 w-4 h-4 bg-background-light dark:bg-background-dark" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Stay logged in for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all transform active:scale-[0.98] mt-4 flex items-center justify-center gap-2" type="submit">
<span>Sign In to Dashboard</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-primary/5 text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs">
                                Restricted area for authorized personnel only. 
                                <br/>
                                Need access? <a class="text-primary font-semibold hover:underline" href="#">Contact System Admin</a>
</p>
</div>
</div>
</div>
</main>
<!-- Simple Footer -->
<footer class="py-6 text-center">
<p class="text-slate-400 dark:text-slate-500 text-xs">
                    © 2024 ArtGallery CMS. All rights reserved.
                </p>
</footer>
</div>
</div>
</body></html>
